<!DOCTYPE html>
<html lang="cs">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Checker</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 20px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 5px; width: 100%; font-weight: bold; }
        textarea { width: 100%; height: 300px; margin-top: 20px; background: #1e1e1e; color: #00ff00; border: 1px solid #333; }
        .loader { display: none; margin: 20px 0; color: #ffaa00; }
    </style>
</head>
<body>
    <h2>IPTV M3U Validátor</h2>
    <input type="text" id="url" placeholder="Vlož URL na m3u playlist">
    <button onclick="checkPlaylist()">Zkontrolovat a vyčistit</button>
    
    <div id="loader" class="loader">Prověřuji streamy, počkejte chvíli...</div>
    <textarea id="result" readonly placeholder="Zde se zobrazí funkční playlist..."></textarea>

    <script>
        async function checkPlaylist() {
            const url = document.getElementById('url').value;
            const loader = document.getElementById('loader');
            const resultArea = document.getElementById('result');

            if(!url) return alert("Vlož URL!");

            loader.style.display = "block";
            resultArea.value = "";

            try {
                const response = await fetch(`/analyze?url=${encodeURIComponent(url)}`);
                const data = await response.text();
                resultArea.value = data;
            } catch (e) {
                alert("Chyba při komunikaci se serverem.");
            } finally {
                loader.style.display = "none";
            }
        }
    </script>
</body>
</html>
